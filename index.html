<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RSDJ — Investigación lingüística</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: system-ui; background:#f4f6f8; padding:1rem; }
.card { background:white; padding:1rem; border-radius:12px; margin-bottom:1rem; }
button { width:100%; padding:0.7rem; border-radius:10px; border:none; background:#2563eb; color:white; }
.result { background:#f5f7fa; padding:1rem; border-radius:10px; }
.hint { font-size:0.85em; color:#555; margin-top:0.4rem; }
</style>
</head>

<body>

<h2>RSDJ — Análisis lingüístico</h2>

<div class="card">
<textarea id="textInput" placeholder="Introduce un texto..."></textarea>
<button onclick="analyze()">Analizar</button>
</div>

<div class="card result" id="result">Esperando análisis…</div>

<script>
const API = "https://rsdj-api.onrender.com";

function analyze() {
  fetch(API + "/analyze", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text:document.getElementById("textInput").value})
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("result").innerHTML = `
      <b>Hipótesis:</b> ${d.hipotesis}<br>
      <b>Entropía:</b> ${d.entropia}<br>
      <b>Zipf:</b> ${d.zipf ?? "insuficiente"}<br>
      <b>TTR:</b> ${d.ttr}<br>
      <div class="hint">
        ${
          d.zipf && d.zipf < -0.9
          ? "Cumple la Ley de Zipf → patrón lingüístico natural."
          : "Se desvía de Zipf → posible texto artificial."
        }<br>
        ${
          d.ttr > 0.4
          ? "Alta diversidad léxica."
          : "Diversidad léxica baja."
        }
      </div>
    `;
  });
}
</script>

</body>
</html>
