<!-- ========================= -->

<div style="margin-top:20px;">
  <button id="lfvBtn">🧬 Analizar con LFV</button>
</div>

<div id="lfvResult" style="
  margin-top:15px;
  padding:12px;
  border:1px solid #ccc;
  border-radius:6px;
  background:#fafafa;
"></div>

<script>
/* ===== LFV Frontend (aditivo, seguro) ===== */

document.getElementById("lfvBtn").addEventListener("click", async () => {
  const input = document.getElementById("textInput");
  if (!input) {
    alert("No se encuentra el textarea con id='textInput'");
    return;
  }

  const text = input.value.trim();
  if (!text) {
    alert("Introduce texto primero");
    return;
  }

  const box = document.getElementById("lfvResult");
  box.innerHTML = "<em>Ejecutando LFV…</em>";

  try {
    const res = await fetch("https://rsdj-api.onrender.com/lfv/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    let html = "<h3>Resultado LFV</h3>";

    html += "<h4>Segmentación funcional</h4><ul>";
    data.segments.forEach(s => {
      html += `
        <li>
          <b>${s.token}</b>
          → [${s.roles.join(", ")}]
          <br>
          <em>${s.function}</em>
        </li>
      `;
    });
    html += "</ul>";

    html += "<h4>Síntesis estructural</h4><ul>";
    for (const k in data.synthesis) {
      html += `<li><b>${k}</b>: ${data.synthesis[k]}</li>`;
    }
    html += "</ul>";

    box.innerHTML = html;

  } catch (err) {
    console.error(err);
    box.innerHTML = "<span style='color:red'>Error al ejecutar LFV</span>";
  }
});
</script>
