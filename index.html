<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1d1b2f">
<title>RSDJ</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{margin:0;background:linear-gradient(180deg,#1d1b2f,#0f1120);color:#fff}
.app{max-width:430px;margin:auto;min-height:100vh;display:flex;flex-direction:column}
header{padding:16px;font-size:22px;font-weight:700;text-align:center}
.view{display:none;padding:12px}
.view.active{display:block}
.card{background:rgba(255,255,255,.06);border-radius:18px;padding:16px;margin-bottom:12px}
textarea,input{width:100%;background:rgba(255,255,255,.1);border:none;border-radius:14px;padding:14px;color:#fff}
button{width:100%;background:linear-gradient(90deg,#ff8a00,#ffb347);border:none;border-radius:15px;padding:14px;font-size:15px;font-weight:600;margin-top:12px}
.metric{margin-top:6px;font-size:14px;opacity:.85}
nav{display:flex;justify-content:space-around;padding:12px;background:rgba(0,0,0,.45)}
nav span{font-size:22px;opacity:.5;cursor:pointer}
nav span.active{opacity:1}
small{opacity:.6}
hr{border:0;border-top:1px solid rgba(255,255,255,.15);margin:12px 0}
</style>
</head>

<body>
<div class="app">

<header>RSDJ</header>

<!-- FEED -->
<div id="home" class="view active"></div>

<!-- ANALIZAR -->
<div id="analyze" class="view">
  <div class="card">
    <textarea id="input" rows="4" placeholder="Introduce texto para analizar…"></textarea>
    <button onclick="runAnalysis()">Analizar texto</button>
  </div>

  <div class="card">
    <input type="file" accept="image/*" capture="environment" onchange="runOCR(this)">
    <small>📷 OCR desde imagen (flujo básico)</small>
  </div>
</div>

<!-- RESULTADO -->
<div id="result" class="view">
  <div class="card" id="resultBox"></div>
</div>

<!-- PERFIL -->
<div id="profile" class="view">
  <div class="card">
    <b>Perfil</b>
    <div class="metric">Análisis guardados: <span id="count">0</span></div>
    <button onclick="clearData()" style="background:#c0392b;margin-top:10px">
      Borrar todos los datos
    </button>
  </div>
</div>

<nav>
  <span id="nav-home" class="active" onclick="show('home')">🏠</span>
  <span id="nav-analyze" onclick="show('analyze')">➕</span>
  <span id="nav-result" onclick="show('result')">📊</span>
  <span id="nav-profile" onclick="show('profile')">👤</span>
</nav>

</div>

<script>
/* =========================
   PERSISTENCIA
========================= */
const STORAGE_KEY = "rsdj_posts_v1";

let posts = [];

function loadPosts(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    try {
      posts = JSON.parse(saved);
    } catch(e){
      posts = [];
    }
  }
}

function savePosts(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
}

function clearData(){
  if(!confirm("¿Seguro que quieres borrar todos los análisis?")) return;
  localStorage.removeItem(STORAGE_KEY);
  posts = [];
  renderFeed();
  document.getElementById("count").innerText = 0;
  show("home");
}

/* =========================
   NAVEGACIÓN
========================= */
function show(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(view).classList.add('active');
  document.querySelectorAll('nav span').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+view).classList.add('active');
  if(view==="home") renderFeed();
}

/* =========================
   ANÁLISIS
========================= */
function entropy(text){
  const f={}; for(let c of text)f[c]=(f[c]||0)+1;
  let e=0,n=text.length;
  for(let c in f){let p=f[c]/n;e-=p*Math.log2(p)}
  return e.toFixed(3);
}

function analyzeText(text){
  const words=text.split(/\s+/);
  const avg=(words.reduce((a,w)=>a+w.length,0)/words.length).toFixed(2);
  const rep=(1-new Set(words).size/words.length).toFixed(2);
  const ent=entropy(words.join(""));
  const freq={}; words.forEach(w=>freq[w.toLowerCase()] = (freq[w.toLowerCase()]||0)+1);

  const particles=Object.entries(freq)
    .filter(([w,c])=>w.length<=3 && c>1)
    .map(([w])=>w)
    .slice(0,8);

  let h="Estructura mixta";
  if(avg<4&&rep<0.3)h="Lengua aislante probable";
  else if(avg>7&&rep>0.4)h="Lengua aglutinante probable";
  else if(ent>4.5)h="Texto cifrado / no lingüístico";

  return {
    id: Date.now(),
    text,
    h, avg, rep, ent, particles,
    time: new Date().toLocaleString()
  };
}

function runAnalysis(){
  const text=document.getElementById('input').value.trim();
  if(!text) return;
  const post = analyzeText(text);
  posts.unshift(post);
  savePosts();
  renderResult(post);
  document.getElementById("count").innerText = posts.length;
  show("result");
}

/* =========================
   OCR (flujo básico)
========================= */
function runOCR(input){
  alert("OCR automático llegará en el siguiente paso con backend.\nPor ahora iOS reconoce texto al copiar.\nCaptura, copia y pega arriba.");
}

/* =========================
   RENDER
========================= */
function renderResult(p){
  document.getElementById('resultBox').innerHTML=`
    <b>${p.h}</b>
    <div class="metric">📏 Longitud media: ${p.avg}</div>
    <div class="metric">🔁 Repetición: ${p.rep}</div>
    <div class="metric">🧮 Entropía: ${p.ent}</div>
    <hr>
    <b>Lenguaje funcional</b>
    <div class="metric">${p.particles.join(", ")||"No claro"}</div>
    <hr>
    <small>${p.time}</small>
  `;
}

function renderFeed(){
  const feed=document.getElementById('home');
  feed.innerHTML='';
  if(posts.length===0){
    feed.innerHTML='<div class="card">No hay análisis todavía.</div>';
    return;
  }
  posts.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <b>${p.h}</b>
      <div class="metric">${p.text.slice(0,100)}...</div>
      <small>${p.time}</small>
    `;
    card.onclick=()=>{renderResult(p);show('result')};
    feed.appendChild(card);
  });
}

/* =========================
   INICIALIZACIÓN
========================= */
loadPosts();
document.getElementById("count").innerText = posts.length;
renderFeed();
</script>
</body>
</html>
``
