<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RSDJ — Comunidad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: system-ui; background:#f4f6f8; padding:1rem; }
.card { background:white; padding:1rem; border-radius:12px; margin-bottom:1rem; }
button { padding:0.5rem 1rem; margin-top:0.5rem; }
.feed-card { background:white; padding:1rem; border-radius:12px; margin-bottom:1rem; }
</style>
</head>
<body>

<h2>RSDJ — Análisis y Comunidad</h2>

<input id="username" placeholder="Usuario">
<button onclick="createUser()">Crear usuario</button>

<div class="card">
<textarea id="textInput" style="width:100%;height:90px;"></textarea>
<button onclick="analyze()">Analizar</button>
</div>

<div class="card" id="result">Esperando análisis…</div>

<h3>📡 Feed</h3>
<div id="feed"></div>

<script>
const API = "https://rsdj-api.onrender.com";
let currentUserId = null;

async function createUser() {
  const r = await fetch(API + "/users", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ username: username.value })
  });
  const u = await r.json();
  currentUserId = u.id;
  alert("Usuario creado: @" + u.username);
}

function analyze() {
  fetch(API + "/analyze", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ text:textInput.value, user_id:currentUserId })
  })
  .then(r => r.json())
  .then(show);
}

function show(d) {
  result.innerHTML = `
    <b>Hipótesis:</b> ${d.hipotesis}<br>
    <b>Traducción LFV:</b><br><i>${d.lfv_fase_3}</i>
    <textarea id="commentText" placeholder="Comenta..."></textarea>
    <button onclick="comment(${d.id})">Comentar</button>
  `;
}

async function comment(id) {
  await fetch(API + "/comment", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      analysis_id:id,
      user_id:currentUserId,
      content:commentText.value
    })
  });
  loadAnalysis(id);
}

async function loadFeed() {
  const r = await fetch(API + "/feed");
  const data = await r.json();
  feed.innerHTML = "";
  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "feed-card";
    div.innerHTML = `
      <b>${p.hipotesis}</b><br>
      ${p.texto_preview}<br>
      <button onclick="loadAnalysis(${p.id})">Ver</button>
    `;
    feed.appendChild(div);
  });
}

async function loadAnalysis(id) {
  const r = await fetch(API + "/analysis/" + id);
  const d = await r.json();
  show(d);
}

loadFeed();
</script>

</body>
</html>
