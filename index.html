<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSDJ</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      padding: 16px;
      margin: 0;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }

    .buttons {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 999px;
      border: none;
      background: #f0f0f0;
      cursor: pointer;
    }

    button:hover {
      background: #e5e5e5;
    }

    #result {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      background: #fafafa;
      min-height: 20px;
    }
  </style>
</head>

<body>

  <h1>RSDJ</h1>

  <textarea id="textInput" placeholder="Introduce aquí el texto a analizar..."></textarea>

  <div class="buttons">
    <button id="analyzeBtn">Analizar texto</button>
    <button id="lfvBtn">🧬 Analizar con LFV</button>
  </div>

  <!-- MISMO CONTENEDOR PARA RSDJ Y LFV -->
  <div id="result"></div>

  <script>
    const API = "https://rsdj-api.onrender.com";

    const textInput = document.getElementById("textInput");
    const resultBox = document.getElementById("result");

    /* =========================
       RSDJ — /analyze
       ========================= */
    document.getElementById("analyzeBtn").addEventListener("click", async () => {
      const text = textInput.value.trim();
      if (!text) {
        alert("Introduce texto primero");
        return;
      }

      resultBox.innerHTML = "Analizando…";

      try {
        const res = await fetch(API + "/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        const data = await res.json();

        resultBox.innerHTML = `
          <b>Hipótesis:</b> ${data.hipotesis}<br>
          <b>Entropía:</b> ${data.entropia}<br>
          <b>TTR:</b> ${data.ttr}<br>
          <b>Zipf:</b> ${data.zipf}<br>
          <b>Repetición:</b> ${data.repeticion}<br>
          <b>Bigramas:</b> ${data.bigram_conc}<br>
          <b>Trigramas:</b> ${data.trigram_conc}
        `;
      } catch (e) {
        resultBox.innerHTML = "Error en el análisis";
      }
    });

    /* =========================
       LFV — /lfv/analyze
       (usa el MISMO resultBox)
       ========================= */
    document.getElementById("lfvBtn").addEventListener("click", async () => {
      const text = textInput.value.trim();
      if (!text) {
        alert("Introduce texto primero");
        return;
      }

      resultBox.innerHTML = "Ejecutando LFV…";

      try {
        const res = await fetch(API + "/lfv/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        const data = await res.json();

        let html = "<b>LFV — Segmentación</b><ul>";
        data.segments.forEach(s => {
          html += `<li><b>${s.token}</b> → [${s.roles.join(", ")}] — ${s.function}</li>`;
        });
        html += "</ul><b>Síntesis</b><ul>";

        for (const k in data.synthesis) {
          html += `<li>${k}: ${data.synthesis[k]}</li>`;
        }
        html += "</ul>";

        resultBox.innerHTML = html;
      } catch (e) {
        resultBox.innerHTML = "Error ejecutando LFV";
      }
    });
  </script>

</body>
</html>
