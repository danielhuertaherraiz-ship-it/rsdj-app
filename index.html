<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LFV Platform <div id="feed"></div><title>LFV Platform — Explora estructura</title>
</div>

<div id="view-analyze" class="view">
  <textarea id="textInput"></textarea>
  <button onclick="analyze()">Analizar</button>
  <div id="result"></div>
</div>

<div id="view-profile" class="view">
  <input id="usernameInput" placeholder="usuario">
  <button onclick="saveUser()">Guardar</button>
  <p id="userStatus"></p>
  <div id="myAnalyses"></div>
</div>

<div id="view-user" class="view">
  <h3 id="publicUsername"></h3>
  <div id="publicAnalyses"></div>
</div>

<div class="bottom-nav">
  <button onclick="goTo('home')">🏠</button>
  <button onclick="goTo('profile')">👤</button>
</div>

<script>
const API="https://rsdj-api.onrender.com";
let currentUser=null;

function goTo(v){location.hash=v}

function showView(v){
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
  const el=document.getElementById("view-"+v);
  if(el) el.classList.add("active");
}

async function router(){
  const hash = location.hash.replace("#","") || "home";

  if(hash.startsWith("user/")){
    const id = hash.split("/")[1];
    showView("user");
    const r = await fetch(API+"/user/"+id);
    const d = await r.json();
    publicUsername.innerText="@"+d.username;
    publicAnalyses.innerHTML="";
    d.analyses.forEach(a=>{
      publicAnalyses.innerHTML+=`
        <div class="card">
          <b>${a.hipotesis}</b>
          <p>${a.texto_preview}</p>
          <p class="meta">${a.lfv_fase_4}</p>
        </div>`;
    });
  } else {
    showView(hash);
  }
}

window.addEventListener("hashchange",router);
router();

function saveUser(){
  fetch(API+"/user",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({username:usernameInput.value})})
  .then(r=>r.json())
  .then(u=>{
    currentUser=u;
    localStorage.setItem("lfv_user",JSON.stringify(u));
    userStatus.innerText="@"+u.username;
    loadMyAnalyses();
  });
}

async function analyze(){
  const r=await fetch(API+"/analyze",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({text:textInput.value,user_id:currentUser?.id})});
  const d=await r.json();
  result.innerHTML=`<b>${d.hipotesis}</b><br>${d.lfv_fase_4}`;
  loadFeed();
}

async function loadFeed(){
  const r=await fetch(API+"/feed");
  const data=await r.json();
  feed.innerHTML="";
  data.forEach(p=>{
    feed.innerHTML+=`
      <div class="card">
        <b>${p.hipotesis}</b>
        <p>${p.texto_preview}</p>
        <p class="meta">${p.lfv_fase_4id}Ver perfil</a>
      </div>`;
  });
}

async function loadMyAnalyses(){
  if(!currentUser) return;
  const r=await fetch(API+"/user/"+currentUser.id+"/analyses");
  const data=await r.json();
  myAnalyses.innerHTML="";
  data.forEach(a=>{
    myAnalyses.innerHTML+=`
      <div class="card">
        <b>${a.hipotesis}</b>
        <p>${a.texto_preview}</p>
        <p class="meta">${a.lfv_fase_4}</p>
      </div>`;
  });
}

loadFeed();
</script>

</body>
</html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

body{font-family:system-ui;background:#f4f6f8;margin:0;padding:1rem;padding-bottom:4.5rem}

.view.active{display:block}
.nav,.bottom-nav{display:flex;gap:.5rem}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;justify-content:space-around;background:white;border-top:1px solid #ddd}
</style>
</head>

  <button onclick="goTo('explore')">Explorar</button>
