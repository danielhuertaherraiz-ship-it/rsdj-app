<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RSDJ — Comunidad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: system-ui; background:#f4f6f8; padding:1rem; }
.card { background:white; padding:1rem; border-radius:12px; margin-bottom:1rem; }
button { width:100%; padding:0.7rem; border-radius:10px; border:none; background:#2563eb; color:white; }
.feed-card { background:white; border-radius:12px; padding:1rem; margin-bottom:1rem; cursor:pointer; }
.meta { font-size:0.85em; color:#555; }
</style>
</head>

<body>

<h2>RSDJ — Análisis y Comunidad</h2>

<div class="card">
<input id="username" placeholder="Usuario (opcional)">
<button onclick="createUser()">Crear usuario</button>
<textarea id="textInput" placeholder="Introduce un texto..." style="width:100%;height:90px;"></textarea>
<button onclick="analyze()">Analizar</button>
</div>

<div class="card" id="result">Esperando análisis…</div>

<hr>
<h3>📡 Feed público</h3>
<div id="feed"></div>

<script>
const API = "https://rsdj-api.onrender.com";
let currentUserId = null;

async function createUser() {
  const r = await fetch(API + "/users", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ username: username.value })
  });
  const u = await r.json();
  currentUserId = u.id;
  alert("Usuario creado: @" + u.username);
}

function analyze() {
  fetch(API + "/analyze", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ text: textInput.value, user_id: currentUserId })
  })
  .then(r => r.json())
  .then(show);
}

function show(d) {
  result.innerHTML = `
    <b>Hipótesis:</b> ${d.hipotesis}<br>
    <b>Entropía:</b> ${d.entropia}<br>
    <b>LFV:</b> ${d.lfv_fase_1}<br>
    <b>Secuencia:</b> ${d.lfv_fase_2.join(" → ")}<br>
    <b>Traducción funcional:</b><br>
    <i>${d.lfv_fase_3}</i>
  `;
}

async function loadFeed() {
  const r = await fetch(API + "/feed");
  const data = await r.json();
  feed.innerHTML = "";
  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "feed-card";
    div.innerHTML = `
      <b>${p.hipotesis}</b>
      <div class="meta">
        Entropía ${p.entropia} · LFV ${p.lfv_fase_1}
      </div>
      <div>${p.texto_preview}</div>
      <div><i>${p.lfv_fase_3}</i></div>
    `;
    div.onclick = () => loadAnalysis(p.id);
    feed.appendChild(div);
  });
}

async function loadAnalysis(id) {
  const r = await fetch(API + "/analysis/" + id);
  const d = await r.json();
  show(d);
}

loadFeed();
</script>

</body>
</html>
