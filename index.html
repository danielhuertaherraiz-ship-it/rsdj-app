<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSDJ</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 16px;
      background: #ffffff;
    }

    h1, h2 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .box {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fafafa;
    }

    .result {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- ================= -->
  <!-- RSDJ PRINCIPAL -->
  <!-- ================= -->

  <h1>RSDJ</h1>

  <textarea id="textInput" placeholder="Introduce aquí el texto a analizar..."></textarea>

  <div>
    <button id="analyzeBtn">Analizar texto</button>
  </div>

  <div id="rsdjResult" class="box result"></div>

  <!-- ================= -->
  <!-- LFV (AÑADIDO SEGURO) -->
  <!-- ================= -->

  <h2>🧬 Análisis LFV</h2>

  <div>
    <button id="lfvBtn">Analizar con LFV</button>
  </div>

  <div id="lfvResult" class="box result"></div>

  <!-- ================= -->
  <!-- JAVASCRIPT -->
  <!-- ================= -->

  <script>
    const API = "https://rsdj-api.onrender.com";

    // -------- RSDJ --------
    document.getElementById("analyzeBtn").addEventListener("click", async () => {
      const text = document.getElementById("textInput").value.trim();
      if (!text) {
        alert("Introduce texto");
        return;
      }

      const box = document.getElementById("rsdjResult");
      box.innerHTML = "Analizando…";

      const res = await fetch(API + "/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      box.innerHTML = `
        <b>Hipótesis:</b> ${data.hipotesis}<br>
        <b>Entropía:</b> ${data.entropia}<br>
        <b>TTR:</b> ${data.ttr}<br>
        <b>Zipf:</b> ${data.zipf}
      `;
    });

    // -------- LFV --------
    document.getElementById("lfvBtn").addEventListener("click", async () => {
      const text = document.getElementById("textInput").value.trim();
      if (!text) {
        alert("Introduce texto");
        return;
      }

      const box = document.getElementById("lfvResult");
      box.innerHTML = "Ejecutando LFV…";

      try {
        const res = await fetch(API + "/lfv/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        const data = await res.json();

        let html = "<b>Segmentación:</b><ul>";
        data.segments.forEach(s => {
          html += `<li><b>${s.token}</b> → [${s.roles.join(", ")}] — ${s.function}</li>`;
        });
        html += "</ul>";

        html += "<b>Síntesis:</b><ul>";
        for (const k in data.synthesis) {
          html += `<li>${k}: ${data.synthesis[k]}</li>`;
        }
        html += "</ul>";

        box.innerHTML = html;
      } catch (e) {
        box.innerHTML = "Error ejecutando LFV";
      }
    });
  </script>

</body>
</html>
