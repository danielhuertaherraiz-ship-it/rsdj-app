<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RSDJ</title>

<style>
body {
  background:#0f1120;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  padding:20px;
}
textarea,input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}
button {
  width:100%;
  padding:14px;
  margin-top:12px;
  background:#ff8a00;
  border:none;
  border-radius:12px;
  font-weight:bold;
}
pre {
  background:#1d1b2f;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>RSDJ — Plataforma Lingüística</h2>

<textarea id="text" placeholder="Introduce texto para analizar..."></textarea>
<button onclick="analyzeText()">Analizar texto</button>

<input type="file" id="image" accept="image/*">
<button onclick="analyzeImage()">Analizar imagen (OCR)</button>

<pre id="result"></pre>

<script>
// ✅ URL DEL BACKEND (CAMBIA SOLO SI CAMBIA RENDER)
const API = "https://rsdj-backend.onrender.com";

async function analyzeText() {
  const text = document.getElementById("text").value;
  const res = await fetch(API + "/analyze", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text})
  });
  document.getElementById("result").textContent =
    JSON.stringify(await res.json(), null, 2);
}

async function analyzeImage() {
  const f = document.getElementById("image").files[0];
  if (!f) return alert("Selecciona una imagen");
  const form = new FormData();
  form.append("file", f);

  const res = await fetch(API + "/ocr", {
    method:"POST",
    body:form
  });
  document.getElementById("result").textContent =
    JSON.stringify(await res.json(), null, 2);
}
</script>

</body>
</html>
