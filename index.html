<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSDJ</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 16px;
      background: #fff;
    }

    h1 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .box {
      margin-top: 15px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fafafa;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- ========================= -->
  <!-- RSDJ ORIGINAL (SIN LFV) -->
  <!-- ========================= -->

  <h1>RSDJ</h1>

  <textarea id="textInput" placeholder="Introduce aquí el texto a analizar..."></textarea>

  <div>
    <button id="analyzeBtn">Analizar texto</button>
  </div>

  <div id="rsdjResult" class="box"></div>

  <!-- ========================= -->
  <!-- JAVASCRIPT -->
  <!-- ========================= -->

  <script>
    const API = "https://rsdj-api.onrender.com";

    /* ---------- RSDJ (igual que antes) ---------- */
    document.getElementById("analyzeBtn").addEventListener("click", async () => {
      const text = document.getElementById("textInput").value.trim();
      if (!text) {
        alert("Introduce texto primero");
        return;
      }

      const box = document.getElementById("rsdjResult");
      box.innerHTML = "Analizando…";

      try {
        const res = await fetch(API + "/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        const data = await res.json();

        box.innerHTML = `
          <b>Hipótesis:</b> ${data.hipotesis}<br>
          <b>Entropía:</b> ${data.entropia}<br>
          <b>TTR:</b> ${data.ttr}<br>
          <b>Zipf:</b> ${data.zipf}
        `;
      } catch (e) {
        box.innerHTML = "Error en el análisis";
      }
    });
  </script>

  <!-- ================================================= -->
  <!-- LFV ADD‑ON (NO TOCA NADA DE ARRIBA) -->
  <!-- ================================================= -->

  <script>
    /*
      LFV SE AÑADE DESPUÉS DE CARGAR LA PÁGINA
      No modifica HTML existente
      No rompe layout
    */

    window.addEventListener("load", () => {
      const textInput = document.getElementById("textInput");
      const mainBtn = document.getElementById("analyzeBtn");
      if (!textInput || !mainBtn) return;

      /* Botón LFV */
      const lfvBtn = document.createElement("button");
      lfvBtn.textContent = "🧬 Analizar con LFV";
      lfvBtn.style.marginLeft = "8px";
      mainBtn.parentNode.appendChild(lfvBtn);

      /* Caja LFV */
      const lfvBox = document.createElement("div");
      lfvBox.className = "box";
      lfvBox.style.display = "none";
      mainBtn.parentNode.appendChild(lfvBox);

      lfvBtn.addEventListener("click", async () => {
        const text = textInput.value.trim();
        if (!text) {
          alert("Introduce texto primero");
          return;
        }

        lfvBox.style.display = "block";
        lfvBox.innerHTML = "Ejecutando LFV…";

        try {
          const res = await fetch(API + "/lfv/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text })
          });

          const data = await res.json();

          let html = "<b>LFV — Segmentación</b><ul>";
          data.segments.forEach(s => {
            html += `<li><b>${s.token}</b> → [${s.roles.join(", ")}] — ${s.function}</li>`;
          });
          html += "</ul><b>Síntesis</b><ul>";

          for (const k in data.synthesis) {
            html += `<li>${k}: ${data.synthesis[k]}</li>`;
          }
          html += "</ul>";

          lfvBox.innerHTML = html;
        } catch (e) {
          lfvBox.innerHTML = "Error ejecutando LFV";
        }
      });
    });
  </script>

</body>
</html>
