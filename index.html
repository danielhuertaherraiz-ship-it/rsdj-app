<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>RSDJ – Análisis Lingüístico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #f4f4f4;
    }
    h1, h2 {
      margin-top: 0.5rem;
    }
    textarea, input[type="file"] {
      width: 100%;
      margin: 0.5rem 0;
    }
    button {
      padding: 0.6rem 1rem;
      margin: 0.5rem 0.3rem 0.5rem 0;
      border: none;
      border-radius: 6px;
      background: #1f6feb;
      color: white;
      cursor: pointer;
    }
    button.secondary {
      background: #555;
    }
    .card {
      background: white;
      padding: 1rem;
      border-radius: 8px;
      margin: 0.8rem 0;
    }
    .muted {
      color: #666;
      font-size: 0.9em;
    }
    ul {
      padding-left: 1.2rem;
    }
  </style>
</head>
<body>

<h1>RSDJ</h1>
<p class="muted">Análisis lingüístico + OCR</p>

<div class="card">
  <h2>Analizar texto</h2>
  <textarea id="textInput" rows="4" placeholder="Escribe o pega un texto aquí..."></textarea>
  <button onclick="analyzeText()">Analizar</button>
</div>

<div class="card">
  <h2>Analizar imagen (OCR)</h2>
  <input type="file" id="imageInput" accept="image/*">
  <button onclick="analyzeImage()">Analizar imagen</button>
</div>

<div class="card">
  <h2>Resultado</h2>
  <pre id="result">Esperando análisis…</pre>
</div>

<div class="card">
  <h2>Historial reciente</h2>
  <button class="secondary" onclick="loadHistory()">Actualizar historial</button>
  <ul id="history"></ul>
</div>

<script>
const API = "https://rsdj-backend.onrender.com";

function showResult(data) {
  document.getElementById("result").textContent =
    JSON.stringify(data, null, 2);
  loadHistory();
}

async function analyzeText() {
  const text = document.getElementById("textInput").value;
  if (!text.trim()) {
    alert("Introduce un texto");
    return;
  }

  const res = await fetch(`${API}/analyze`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({text})
  });

  const data = await res.json();
  showResult(data);
}

async function analyzeImage() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) {
    alert("Selecciona una imagen");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch(`${API}/ocr`, {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  showResult(data);
}

async function loadHistory() {
  const res = await fetch(`${API}/history`);
  const data = await res.json();

  const list = document.getElementById("history");
  list.innerHTML = "";

  if (data.length === 0) {
    list.innerHTML = "<li class='muted'>No hay análisis aún</li>";
    return;
  }

  data.forEach(item => {
    const li = document.createElement("li");
    li.innerHTML = `
      <strong>${item.hypothesis}</strong><br>
      <span class="muted">
        ${item.source.toUpperCase()} ·
        entropía ${item.entropy} ·
        ${new Date(item.created_at).toLocaleString()}
      </span>
    `;
    list.appendChild(li);
  });
}

// cargar historial al abrir
loadHistory();
</script>

</body>
</html>
