<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LFV Platform — Explora estructura</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4f46e5">

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== BASE ===== */
body {
  font-family: system-ui;
  background:#f4f6f8;
  margin:0;
  padding:1rem;
}

h1,h2,h3 { margin-top:0; }

.card {
  background:white;
  padding:1rem;
  border-radius:16px;
  margin-bottom:1rem;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
}

textarea {
  width:100%;
  border-radius:10px;
  border:1px solid #ccc;
  padding:.6rem;
  font-size:1rem;
}

button {
  padding:.6rem 1rem;
  border:none;
  border-radius:999px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

button.secondary {
  background:#e5e7eb;
  color:#111;
}

.feed-card {
  cursor:pointer;
}

.meta {
  font-size:.85em;
  color:#555;
}

.story {
  background:linear-gradient(135deg,#6366f1,#4f46e5);
  color:white;
  padding:1rem;
  border-radius:14px;
}
</style>
</head>

<body>

<h1>🧠 LFV Platform</h1>

<!-- 👤 PERFIL -->
<div class="card">
  <h3>👤 Mi perfil</h3>
  <input id="usernameInput" placeholder="elige un nombre"
         style="width:100%;padding:.5rem;border-radius:10px;border:1px solid #ccc;">
  <button onclick="saveUser()">Guardar perfil</button>
  <button class="secondary" onclick="toggleProfile()">Ver mi perfil</button>
  <p class="meta" id="userStatus"></p>
</div>

<!-- 📚 MIS ANALISIS -->
<div class="card" id="profileCard" style="display:none;">
  <h3>📚 Mis análisis</h3>
  <div id="myAnalyses"></div>
</div>

<!-- ANALYZE -->
<div class="card">
  <h3>Analiza un texto</h3>
  <textarea id="textInput" rows="4"></textarea>
  <button onclick="analyze()">Analizar</button>
</div>

<div class="story" id="microLesson" style="display:none;">
  <p id="lessonText"></p>
</div>

<div class="card" id="result">Esperando análisis…</div>

<div class="card" id="chartCard" style="display:none;">
  <canvas id="structureChart"></canvas>
</div>

<div class="card" id="exploreCard" style="display:none;">
  <p id="exploreText"></p>
</div>

<h3>📰 Exploraciones recientes</h3>
<div id="feed"></div>

<script>
const API = "https://rsdj-api.onrender.com";
let currentUser = null;
let chartInstance = null;

/* ===== USUARIO ===== */
function saveUser(){
  fetch(API + "/user", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ username: usernameInput.value })
  })
  .then(r=>r.json())
  .then(u=>{
    currentUser = u;
    localStorage.setItem("lfv_user", JSON.stringify(u));
    userStatus.innerText = "@" + u.username;
  });
}

const stored = localStorage.getItem("lfv_user");
if(stored){
  currentUser = JSON.parse(stored);
  userStatus.innerText = "@" + currentUser.username;
}

/* ===== PERFIL ===== */
function toggleProfile(){
  profileCard.style.display =
    profileCard.style.display === "none" ? "block" : "none";
  if(profileCard.style.display === "block") loadMyAnalyses();
}

async function loadMyAnalyses(){
  const r = await fetch(API + "/user/" + currentUser.id + "/analyses");
  const data = await r.json();
  myAnalyses.innerHTML = "";

  for(const a of data){
    myAnalyses.innerHTML += `
      <div class="card">
        <b>${a.hipotesis}</b>
        <p>${a.texto_preview}</p>
        <p class="meta">${a.lfv_fase_4}</p>
        <p class="meta" id="reactions-${a.id}">Cargando reacciones…</p>
      </div>
    `;
    loadAnalysisReactions(a.id, document.getElementById("reactions-"+a.id));
  }
}

/* ===== REACCIONES PERFIL ===== */
async function loadAnalysisReactions(id, el){
  const r = await fetch(API + "/analysis/" + id + "/reactions");
  const data = await r.json();
  el.innerText = `🧠 ${data.learned || 0}   ⭐ ${data.interesting || 0}`;
}

/* ===== ANALYZE ===== */
function analyze(){
  fetch(API + "/analyze", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      text:textInput.value,
      user_id: currentUser ? currentUser.id : null
    })
  })
  .then(r=>r.json())
  .then(d=>{
    result.innerHTML = `<b>${d.hipotesis}</b><br>${d.lfv_fase_4}`;
    loadFeed();
  });
}

/* ===== FEED ===== */
function sendReaction(id,type){
  fetch(API + "/react", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ analysis_id:id, type:type })
  });
}

async function loadFeed(){
  const r = await fetch(API + "/feed");
  const data = await r.json();
  feed.innerHTML="";
  data.forEach(p=>{
    feed.innerHTML+=`
      <div class="card feed-card">
        <b>${p.hipotesis}</b>
        <p>${p.texto_preview}</p>
        <p class="meta">${p.lfv_fase_4}</p>
        <button class="secondary" onclick="sendReaction(${p.id},'learned')">🧠</button>
        <button class="secondary" onclick="sendReaction(${p.id},'interesting')">⭐</button>
      </div>`;
  });
}

loadFeed();
</script>

</body>
</html>
