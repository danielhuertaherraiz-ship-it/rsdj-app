<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RSDJ + LFV</title>
<style>
body { font-family: system-ui; background:#f4f6f8; padding:1rem; }
.card { background:#fff; padding:1rem; border-radius:10px; margin-bottom:1rem; }
textarea { width:100%; min-height:100px; }
button { padding:0.6rem 1rem; margin-top:0.5rem; }
pre { background:#f0f2f5; padding:1rem; border-radius:8px; }
</style>
</head>
<body>

<h2>RSDJ — Análisis y LFV</h2>

<div class="card">
<textarea id="textInput" placeholder="Introduce texto"></textarea>
<br>
<button onclick="analyze()">Analizar</button>
<button onclick="analyzeLFV()">Analizar LFV</button>
</div>

<div class="card">
<pre id="result">Esperando análisis…</pre>
</div>

<script>
const API = "http://127.0.0.1:8000";

async function analyze(){
  const r = await fetch(API + "/analyze", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({text: textInput.value})
  });
  result.textContent = JSON.stringify(await r.json(), null, 2);
}

async function analyzeLFV(){
  const r = await fetch(API + "/lfv/translate", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({text: textInput.value})
  });
  result.textContent = JSON.stringify(await r.json(), null, 2);
}
</script>

</body>
</html>
