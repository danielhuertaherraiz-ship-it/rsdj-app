<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RSDJ — Análisis y Comunidad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: system-ui; background:#f4f6f8; padding:1rem; }
.card { background:white; padding:1rem; border-radius:12px; margin-bottom:1rem; }
.feed-card { background:white; padding:1rem; border-radius:12px; margin-bottom:1rem; cursor:pointer; }
.meta { font-size:.85em; color:#555; }
</style>
</head>
<body>

<h2>RSDJ — Análisis y Comunidad</h2>

<div class="card">
<textarea id="textInput" rows="4" placeholder="Introduce texto"></textarea>
<button onclick="analyze()">Analizar</button>
</div>

<div class="card" id="result">Esperando análisis…</div>

<div class="card">
<h3>🔀 Comparación semántica</h3>
<textarea id="textA"></textarea>
<textarea id="textB"></textarea>
<button onclick="compare()">Comparar</button>
<div id="compareResult"></div>
</div>

<h3>📡 Feed</h3>
<div id="feed"></div>

<script>
const API = "https://rsdj-api.onrender.com";

function analyze() {
  fetch(API + "/analyze", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ text: textInput.value })
  })
  .then(r => r.json())
  .then(d => {
    result.innerHTML = `
      <b>${d.hipotesis}</b><br>
      <i>${d.lfv_fase_4}</i>
    `;
  });
}

function compare() {
  fetch(API + "/compare_semantic", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ textA: textA.value, textB: textB.value })
  })
  .then(r => r.json())
  .then(d => compareResult.innerText = d.comparacion_lfv);
}

async function loadFeed() {
  const r = await fetch(API + "/feed");
  const data = await r.json();
  feed.innerHTML = "";
  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "feed-card";
    div.innerHTML = `<b>${p.hipotesis}</b><br>${p.texto_preview}<br><i>${p.lfv_fase_4}</i>`;
    div.onclick = () => analyzeById(p.id);
    feed.appendChild(div);
  });
}

async function analyzeById(id){
  const r = await fetch(API + "/analysis/" + id);
  const d = await r.json();
  result.innerHTML = `<b>${d.hipotesis}</b><br><i>${d.lfv_fase_4}</i>`;
}

loadFeed();
</script>

</body>
</html>
