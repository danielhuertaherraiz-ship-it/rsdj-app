<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RSDJ — Análisis e Investigación Lingüística</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: system-ui; background:#f4f6f8; padding:1rem; }
.card { background:white; padding:1rem; border-radius:12px; margin-bottom:1rem; }
textarea { width:100%; min-height:90px; }
button {
  width:100%;
  padding:0.7rem;
  border-radius:10px;
  background:#2563eb;
  color:white;
  border:none;
  margin-top:0.5rem;
}
.result { background:#f5f7fa; padding:1rem; border-radius:10px; }
.history { font-size:0.9em; margin-top:0.5rem; cursor:pointer; }
hr { margin:1rem 0; }
input[type="file"] { margin-top:0.5rem; }
select { width:100%; padding:0.5rem; border-radius:8px; margin-bottom:0.5rem; }

/* Barra de confianza */
.conf-bar { margin-top:0.4rem; background:#e5e7eb; border-radius:999px; height:12px; overflow:hidden; }
.conf-fill { height:100%; }
.conf-low { background:#dc2626; }
.conf-mid { background:#f59e0b; }
.conf-high { background:#16a34a; }

/* Conclusión final */
.conclusion {
  margin-top:1rem;
  padding:0.8rem;
  border-radius:10px;
  background:#eef2ff;
  font-weight:600;
}
</style>
</head>

<body>

<h2>RSDJ</h2>

<div class="card">
  <textarea id="textInput" placeholder="Introduce un texto"></textarea>

  <select id="presetSelect">
    <option value="general">Modo general</option>
    <option value="forense">Modo forense</option>
    <option value="ia">Modo detección IA</option>
  </select>

  <button onclick="analyze()">Analizar texto</button>
  <button onclick="analyzeLFV()">🧬 Analizar con LFV</button>
</div>

<div class="card result" id="result">Esperando análisis…</div>

<div class="card">
  <strong>Historial</strong>
  <div id="history"></div>
</div>

<script>
const API="https://rsdj-api.onrender.com";
let lastRSDJ=null;
let lastLFV=null;

/* CONCLUSIÓN COMBINADA */
function buildConclusion(){
  if(!lastRSDJ || !lastLFV) return "";

  let base = `Conclusión global: ${lastRSDJ.hipotesis}`;
  let conf = lastRSDJ.confidence_label || "";

  let structural = lastLFV.synthesis?.interpretation || "estructura funcional detectada";

  return `
    <div class="conclusion">
      ${base}<br>
      ${structural}<br>
      Nivel de confianza: ${conf}
    </div>
  `;
}

/* MOSTRAR RSDJ */
function showRSDJ(d){
  lastRSDJ=d;

  const pct=Math.round(d.confidence*100);
  let cls="conf-low";
  if(pct>=70) cls="conf-high";
  else if(pct>=40) cls="conf-mid";

  result.innerHTML=`
    <b>Hipótesis:</b> ${d.hipotesis}<br>
    Entropía: ${d.entropia}<br>
    Zipf: ${d.zipf}<br>
    TTR: ${d.ttr}<br>

    <hr>
    <b>Confianza:</b> ${d.confidence} (${d.confidence_label})
    <div class="conf-bar">
      <div class="conf-fill ${cls}" style="width:${pct}%"></div>
    </div>
    <ul>${(d.confidence_explanation||[]).map(e=>`<li>${e}</li>`).join("")}</ul>

    ${buildConclusion()}
  `;
}

/* ANALYZE */
async function analyze(){
  const r=await fetch(API+"/analyze",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      text:textInput.value,
      preset:presetSelect.value
    })
  });
  showRSDJ(await r.json());
  loadHistory();
}

/* LFV */
async function analyzeLFV(){
  const r=await fetch(API+"/lfv/analyze",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text:textInput.value})
  });
  lastLFV=await r.json();

  let html="<b>LFV — Segmentación</b><ul>";
  lastLFV.segments.forEach(s=>{
    html+=`<li>${s.token} → ${s.function}</li>`;
  });
  html+="</ul>";

  result.innerHTML+=html + buildConclusion();
}

/* HISTORIAL */
async function loadHistory(){
  const r=await fetch(API+"/history");
  const h=await r.json();
  history.innerHTML=h.map(x=>`
    <div class="history" onclick="loadAnalysis(${x.id})">
      ${x.created_at} — ${x.hypothesis}
    </div>`).join("");
}
async function loadAnalysis(id){
  const r=await fetch(API+"/analysis/"+id);
  showRSDJ(await r.json());
}

loadHistory();
</script>
</body>
</html>
