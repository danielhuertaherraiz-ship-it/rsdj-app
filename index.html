<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSDJ</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: #0f1120;
      color: #ffffff;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    textarea, input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      background: #1d1b2f;
      color: #ffffff;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(90deg, #ff8a00, #ffb347);
      color: #000;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    pre {
      background: #1d1b2f;
      padding: 14px;
      margin-top: 14px;
      border-radius: 14px;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.85;
    }
  </style>
</head>

<body>

  <h2>RSDJ — Plataforma Lingüística</h2>

  <!-- TEXTO -->
  <textarea id="text" placeholder="Introduce texto para analizar…"></textarea>
  <button id="btnText" onclick="analyzeText()">Analizar texto</button>

  <!-- OCR -->
  <input type="file" id="image" accept="image/*" />
  <button id="btnImage" onclick="analyzeImage()">Analizar imagen (OCR)</button>

  <div class="status" id="status"></div>
  <pre id="result"></pre>

  <script>
    /******************************************************
     * CONFIGURACIÓN
     ******************************************************/
    const API = "https://rsdj-backend.onrender.com";

    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");
    const btnText = document.getElementById("btnText");
    const btnImage = document.getElementById("btnImage");

    function setLoading(message) {
      statusEl.textContent = message;
      resultEl.textContent = "";
      btnText.disabled = true;
      btnImage.disabled = true;
    }

    function clearLoading() {
      btnText.disabled = false;
      btnImage.disabled = false;
    }

    /******************************************************
     * ANALIZAR TEXTO
     ******************************************************/
    async function analyzeText() {
      const text = document.getElementById("text").value.trim();
      if (!text) {
        alert("Introduce algún texto.");
        return;
      }

      setLoading("⏳ Analizando texto… (puede tardar la primera vez)");

      try {
        const response = await fetch(API + "/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text })
        });

        if (!response.ok) {
          throw new Error("Error HTTP " + response.status);
        }

        const data = await response.json();
        resultEl.textContent = JSON.stringify(data, null, 2);
        statusEl.textContent = "✅ Análisis completado correctamente.";

      } catch (err) {
        resultEl.textContent = "❌ ERROR:\n" + err.message;
        statusEl.textContent = "No se pudo conectar con el backend.";
      } finally {
        clearLoading();
      }
    }

    /******************************************************
     * ANALIZAR IMAGEN (OCR)
     ******************************************************/
    async function analyzeImage() {
      const file = document.getElementById("image").files[0];
      if (!file) {
        alert("Selecciona una imagen primero.");
        return;
      }

      setLoading("📸 Procesando imagen y OCR… (puede tardar)");

      const formData = new FormData();
      formData.append("file", file);

      try {
        const response = await fetch(API + "/ocr", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          throw new Error("Error HTTP " + response.status);
        }

        const data = await response.json();
        resultEl.textContent = JSON.stringify(data, null, 2);
        statusEl.textContent = "✅ OCR y análisis completados.";

      } catch (err) {
        resultEl.textContent = "❌ ERROR:\n" + err.message;
        statusEl.textContent = "No se pudo procesar la imagen.";
      } finally {
        clearLoading();
      }
    }
  </script>

</body>
</html>
