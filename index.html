<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>RSDJ — Análisis Lingüístico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 1rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 0.2rem;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 1.5rem;
      font-size: 0.95em;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: vertical;
      font-size: 1em;
    }

    button {
      width: 100%;
      padding: 0.7rem;
      font-size: 1em;
      margin-top: 0.7rem;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .status {
      margin-top: 0.5rem;
      font-size: 0.9em;
      color: #555;
      min-height: 1.2em;
    }

    .result-box {
      background: #f5f7fa;
      border-radius: 10px;
      padding: 1rem;
      margin-top: 1rem;
      font-size: 0.95em;
    }

    .hint {
      margin-top: 0.4rem;
      font-size: 0.85em;
      color: #666;
    }

    .history-item {
      margin-top: 0.6rem;
      padding-top: 0.6rem;
      border-top: 1px solid #e5e7eb;
      font-size: 0.9em;
      cursor: pointer;
    }

    .history-item:hover {
      background: #f1f5f9;
    }
  </style>
</head>

<body>

<h1>RSDJ</h1>
<div class="subtitle">
  Análisis lingüístico automático · Texto y OCR
</div>

<!-- TEXTO -->
<div class="card">
  <strong>Analizar texto</strong>
  <textarea id="textInput" placeholder="Escribe o pega un texto aquí..."></textarea>
  <button id="textButton" onclick="analyzeText()">Analizar texto</button>
  <div id="textStatus" class="status"></div>
</div>

<!-- RESULTADO -->
<div class="card">
  <div id="result" class="result-box">
    <em>Selecciona un análisis o realiza uno nuevo.</em>
  </div>
</div>

<!-- HISTORIAL -->
<div class="card">
  <strong>Historial reciente</strong>
  <button onclick="loadHistory()">Actualizar historial</button>
  <div id="historyList" class="hint"></div>
</div>

<script>
  const API = "https://rsdj-api.onrender.com";

  function setLoading(button, statusEl, msg) {
    button.disabled = true;
    statusEl.textContent = msg;
  }

  function setIdle(button) {
    button.disabled = false;
  }

  function showResult(data) {
    document.getElementById("result").innerHTML = `
      <strong>Resultado del análisis</strong><br><br>
      🔍 <strong>Hipótesis:</strong> ${data.hipotesis}<br>
      📏 <strong>Longitud media:</strong> ${data.longitud_media}<br>
      🔁 <strong>Repetición:</strong> ${data.repeticion}<br>
      ⚙️ <strong>Entropía:</strong> ${data.entropia}
      <div class="hint">
        Interpretación automática basada en estructura y complejidad.
      </div>
    `;
  }

  async function analyzeText() {
    const text = document.getElementById("textInput").value.trim();
    const status = document.getElementById("textStatus");
    const button = document.getElementById("textButton");

    if (!text) return alert("Introduce un texto.");

    setLoading(button, status, "⏳ Analizando texto…");

    try {
      const res = await fetch(API + "/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      showResult(data);
      status.textContent = "✅ Análisis completado";
      loadHistory();
    } catch {
      status.textContent = "❌ Error al contactar con el servidor.";
    }

    setIdle(button);
  }

  async function loadHistory() {
    const container = document.getElementById("historyList");
    container.textContent = "Cargando historial…";

    try {
      const res = await fetch(API + "/history");
      const data = await res.json();

      if (!data.length) {
        container.textContent = "No hay análisis todavía.";
        return;
      }

      container.innerHTML = data.map(item => `
        <div class="history-item" onclick="loadAnalysis(${item.id})">
          🕒 ${new Date(item.created_at).toLocaleString()}<br>
          🔍 ${item.hypothesis}<br>
          ⚙️ Entropía: ${item.entropy}
        </div>
      `).join("");
    } catch {
      container.textContent = "No se pudo cargar el historial.";
    }
  }

  async function loadAnalysis(id) {
    document.getElementById("result").innerHTML = "⏳ Cargando análisis…";

    try {
      const res = await fetch(API + "/analysis/" + id);
      const data = await res.json();
      showResult(data);
    } catch {
      document.getElementById("result").innerHTML =
        "❌ No se pudo cargar el análisis.";
    }
  }

  // Cargar historial al abrir
  loadHistory();
</script>

</body>
</html>
