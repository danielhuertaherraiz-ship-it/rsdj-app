<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>RSDJ — Análisis Lingüístico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 1rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 0.2rem;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 1.5rem;
      font-size: 0.95em;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: vertical;
      font-size: 1em;
    }

    input[type="file"] {
      margin-top: 0.5rem;
    }

    button {
      width: 100%;
      padding: 0.7rem;
      font-size: 1em;
      margin-top: 0.7rem;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .status {
      margin-top: 0.5rem;
      font-size: 0.9em;
      color: #555;
      min-height: 1.2em;
    }

    .result-box {
      background: #f5f7fa;
      border-radius: 10px;
      padding: 1rem;
      margin-top: 1rem;
      font-size: 0.95em;
    }

    .result-box strong {
      font-size: 1.1em;
    }

    .hint {
      margin-top: 0.5rem;
      font-size: 0.85em;
      color: #666;
    }
  </style>
</head>

<body>

  <h1>RSDJ</h1>
  <div class="subtitle">
    Análisis lingüístico automático · Texto y OCR
  </div>

  <!-- TEXTO -->
  <div class="card">
    <strong>Analizar texto</strong>
    <textarea id="textInput" placeholder="Escribe o pega un texto aquí..."></textarea>
    <button id="textButton" onclick="analyzeText()">Analizar texto</button>
    <div id="textStatus" class="status"></div>
  </div>

  <!-- OCR -->
  <div class="card">
    <strong>Analizar imagen (OCR)</strong>
    <input type="file" id="imageInput" accept="image/*">
    <button id="imageButton" onclick="analyzeImage()">Analizar imagen</button>
    <div id="imageStatus" class="status"></div>
  </div>

  <!-- RESULTADO -->
  <div class="card">
    <div id="result" class="result-box">
      <em>El resultado aparecerá aquí.</em>
    </div>
  </div>

<script>
  const API = "https://rsdj-api.onrender.com";

  function setLoading(button, statusEl, message) {
    button.disabled = true;
    statusEl.textContent = message;
  }

  function setIdle(button) {
    button.disabled = false;
  }

  function showResult(data) {
    const result = document.getElementById("result");

    result.innerHTML = `
      <strong>Resultado del análisis</strong><br><br>

      🔍 <strong>Hipótesis:</strong> ${data.hipotesis}<br>
      📏 <strong>Longitud media de palabra:</strong> ${data.longitud_media}<br>
      🔁 <strong>Repetición léxica:</strong> ${data.repeticion}<br>
      ⚙️ <strong>Entropía:</strong> ${data.entropia}<br>

      <div class="hint">
        Interpretación automática basada en patrones de longitud,
        repetición y complejidad estructural del texto.
      </div>
    `;
  }

  async function analyzeText() {
    const text = document.getElementById("textInput").value.trim();
    const status = document.getElementById("textStatus");
    const button = document.getElementById("textButton");

    if (!text) {
      alert("Introduce un texto para analizar.");
      return;
    }

    setLoading(button, status, "⏳ Analizando texto…");

    try {
      const res = await fetch(API + "/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });

      if (!res.ok) throw new Error("Error servidor");

      const data = await res.json();
      showResult(data);
      status.textContent = "✅ Análisis completado";

    } catch (err) {
      status.textContent =
        "❌ No se ha podido contactar con el servidor. Intenta de nuevo en unos segundos.";
    }

    setIdle(button);
  }

  async function analyzeImage() {
    const fileInput = document.getElementById("imageInput");
    const status = document.getElementById("imageStatus");
    const button = document.getElementById("imageButton");

    if (!fileInput.files.length) {
      alert("Selecciona una imagen.");
      return;
    }

    setLoading(button, status, "⏳ Procesando imagen…");

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
      const res = await fetch(API + "/ocr", {
        method: "POST",
        body: formData
      });

      if (!res.ok) throw new Error("Error OCR");

      const data = await res.json();

      if (!data.texto || data.texto.trim().length === 0) {
        status.textContent = "⚠️ No se ha detectado texto en la imagen.";
        setIdle(button);
        return;
      }

      showResult(data);
      status.textContent = "✅ Análisis OCR completado";

    } catch (err) {
      status.textContent =
        "❌ Error al procesar la imagen. Intenta con otra más clara.";
    }

    setIdle(button);
  }
</script>

</body>
</html>
