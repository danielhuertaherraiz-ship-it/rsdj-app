<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RSDJ — Análisis e Investigación Lingüística</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: system-ui; background:#f4f6f8; padding:1rem; }
.card { background:white; padding:1rem; border-radius:12px; margin-bottom:1rem; }
textarea { width:100%; min-height:90px; }
button {
  width:100%;
  padding:0.7rem;
  border-radius:10px;
  background:#2563eb;
  color:white;
  border:none;
  margin-top:0.5rem;
}
.result { background:#f5f7fa; padding:1rem; border-radius:10px; }
.history { font-size:0.9em; margin-top:0.5rem; cursor:pointer; }
hr { margin:1rem 0; }
input[type="file"] { margin-top:0.5rem; }
</style>
</head>

<body>

<h2>RSDJ</h2>

<!-- TEXTO -->
<div class="card">
  <textarea id="textInput" placeholder="Introduce un texto"></textarea>
  <button onclick="analyze()">Analizar texto</button>
  <button onclick="analyzeLFV()">🧬 Analizar con LFV</button>
</div>

<!-- OCR -->
<div class="card">
  <strong>Análisis desde imagen (OCR)</strong>
  <input type="file" id="imageInput" accept="image/*">
  <button onclick="analyzeImage()">Analizar imagen</button>
</div>

<!-- RESULTADO -->
<div class="card result" id="result">Esperando análisis…</div>

<!-- EXPORT -->
<div class="card">
  <button onclick="exportText()">Exportar análisis (TXT)</button>
  <button onclick="window.print()">Exportar análisis (PDF)</button>
</div>

<!-- HISTORIAL -->
<div class="card">
  <strong>Historial</strong>
  <div id="history"></div>
</div>

<!-- COMPARACIÓN -->
<div class="card">
  <strong>Comparación entre textos</strong>
  <textarea id="textA" placeholder="Texto A"></textarea>
  <textarea id="textB" placeholder="Texto B"></textarea>
  <button onclick="compare()">Comparar</button>
  <div id="comparisonResult"></div>
</div>

<script>
const API="https://rsdj-api.onrender.com";
let last=null;

/* MOSTRAR RESULTADO */
function show(d){
  last=d;

  let confidenceHTML="";
  if(d.confidence!==undefined){
    confidenceHTML=`
      <hr>
      <b>Confianza estructural:</b> ${d.confidence}<br>
      <b>Nivel:</b> ${d.confidence_label}
      <ul>
        ${(d.confidence_explanation||[]).map(e=>`<li>${e}</li>`).join("")}
      </ul>
    `;
  }

  document.getElementById("result").innerHTML=`
    <b>Hipótesis:</b> ${d.hipotesis}<br>
    Entropía: ${d.entropia}<br>
    Zipf: ${d.zipf}<br>
    TTR: ${d.ttr}<br>
    Bigramas: ${d.bigram_conc}<br>
    Trigramas: ${d.trigram_conc}
    ${confidenceHTML}
  `;
}

/* TEXTO */
async function analyze(){
  const t=textInput.value;
  const r=await fetch(API+"/analyze",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text:t})
  });
  show(await r.json());
  loadHistory();
}

/* LFV */
async function analyzeLFV(){
  const t=textInput.value;
  if(!t){alert("Introduce texto primero");return;}
  result.innerHTML="Ejecutando LFV…";

  const r=await fetch(API+"/lfv/analyze",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text:t})
  });

  const d=await r.json();
  let html="<b>LFV — Segmentación</b><ul>";
  d.segments.forEach(s=>{
    html+=`<li><b>${s.token}</b> → [${s.roles.join(", ")}] — ${s.function}</li>`;
  });
  html+="</ul><b>Síntesis</b><ul>";
  for(const k in d.synthesis){
    html+=`<li>${k}: ${d.synthesis[k]}</li>`;
  }
  html+="</ul>";
  result.innerHTML=html;
}

/* OCR */
async function analyzeImage(){
  const file=imageInput.files[0];
  if(!file){alert("Selecciona imagen");return;}
  result.innerHTML="Procesando imagen…";
  const f=new FormData(); f.append("file",file);
  const r=await fetch(API+"/ocr",{method:"POST",body:f});
  show(await r.json());
  loadHistory();
}

/* HISTORIAL */
async function loadHistory(){
  const r=await fetch(API+"/history");
  const h=await r.json();
  history.innerHTML=h.map(x=>`
    <div class="history" onclick="loadAnalysis(${x.id})">
      ${x.created_at} — ${x.hypothesis}
    </div>`).join("");
}
async function loadAnalysis(id){
  const r=await fetch(API+"/analysis/"+id);
  show(await r.json());
}

/* COMPARAR */
async function compare(){
  const a=await analyzeText(textA.value);
  const b=await analyzeText(textB.value);
  const d=Math.sqrt(
    (a.entropia-b.entropia)**2+
    (a.zipf-b.zipf)**2+
    (a.ttr-b.ttr)**2
  ).toFixed(3);
  comparisonResult.innerHTML=`Distancia estructural: ${d}`;
}
async function analyzeText(t){
  const r=await fetch(API+"/analyze",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text:t})
  });
  return r.json();
}

/* EXPORT */
function exportText(){
  if(!last)return;
  const c=`RSDJ
Hipótesis:${last.hipotesis}
Confianza:${last.confidence}
Entropía:${last.entropia}
Zipf:${last.zipf}
TTR:${last.ttr}`;
  const b=new Blob([c],{type:"text/plain"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download="rsdj.txt";
  a.click();
}

loadHistory();
</script>
</body>
</html>
